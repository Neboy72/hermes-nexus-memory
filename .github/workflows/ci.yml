name: Quickstart & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  base-install:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install base package
        run: |
          pip install --upgrade pip
          pip install -e .
      - name: Core import test
        run: python3 -c "import nexus; print('✅ Core import OK')"
      - name: CLI smoke test
        run: |
          nexus-export --help 2>&1 || nexus-discovery --help 2>&1 || echo "CLI smoke test done"

  full-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install with all extras
        run: |
          pip install --upgrade pip
          pip install -e ".[all]"
      - name: Run tests
        run: |
          pip install pytest
          python3 -m pytest tests/ -v --tb=short -x
